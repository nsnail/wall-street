name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            make

      - name: Build
        shell: msys2 {0}
        run: make

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts/win-x64 -Force
          Copy-Item build/WallStreetTicker.exe artifacts/win-x64/
          Copy-Item build/appsettings.json artifacts/win-x64/
          Compress-Archive -Path artifacts/win-x64/* -DestinationPath artifacts/WallStreetTicker-win-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WallStreetTicker-win-x64
          path: artifacts/WallStreetTicker-win-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/WallStreetTicker-win-x64.zip
          generate_release_notes: true
