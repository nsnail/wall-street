name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Publish
        run: dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o artifacts/win-x64

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts/win-x64/* -DestinationPath artifacts/WallStreetTicker-win-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WallStreetTicker-win-x64
          path: artifacts/WallStreetTicker-win-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/WallStreetTicker-win-x64.zip
          generate_release_notes: true
